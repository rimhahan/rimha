<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HANHARIM</title>

  <link rel="icon" href="image/icon2.png">

  <script>
    (function(d) {
      var config = { kitId: 'eer4nif', scriptTimeout: 3000, async: true },
      h=d.documentElement,t=setTimeout(function(){h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";},config.scriptTimeout),tk=d.createElement("script"),f=false,s=d.getElementsByTagName("script")[0],a;h.className+=" wf-loading";tk.src='https://use.typekit.net/'+config.kitId+'.js';tk.async=true;tk.onload=tk.onreadystatechange=function(){a=this.readyState;if(f||a&&a!="complete"&&a!="loaded")return;f=true;clearTimeout(t);try{Typekit.load(config)}catch(e){}};s.parentNode.insertBefore(tk,s)
    })(document);
  </script>

  <style>
    :root {
      --color-bg: rgb(0, 0, 0);
      --color-text: #fd7db5;
      --ls-hero: 0.05em;
      --lh-hero: 0.9;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      text-align: center; 
    }

    /* --- 상단 타이틀 --- */
    .header-sticky {
      position: sticky;
      top: 0;
      background-color: transparent; 
      padding: 70px 20px 20px; 
      z-index: 100;
      pointer-events: none; 
    }
    .header-sticky .hero-title { pointer-events: auto; }

    .hero-title {
      font-family: "duckie", sans-serif;
      font-weight: 400;
      font-size: clamp(24px, 9vw, 100px); 
      text-transform: uppercase;
      letter-spacing: var(--ls-hero);
      line-height: var(--lh-hero);
      width: 100%;
      white-space: nowrap;
    }

    /* --- 메인 컨텐츠 영역 --- */
    .content-area {
      flex: 1;
      padding: 50px 0 0; 
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      position: relative; 
    }

    .book-grid {
      display: grid;
      grid-template-columns: repeat(3, min-content); 
      justify-content: center; 
      column-gap: 3vw;  
      row-gap: 5vw;     
      max-width: 1400px; 
      width: 100%;
      margin: 0 auto; 
      align-items: end; 
    }

    .book-item {
      display: flex;
      justify-content: center; 
      align-items: flex-end;
      height: 35vw; 
      max-height: 540px; 
      min-height: 250px;
      position: relative;
    }

    .book-item img {
      height: 100%;
      width: auto; 
      display: block;
      box-shadow: 0 0 50px rgba(255, 119, 171, 0); 
    }

    /* --- 하단 정보 텍스트 --- */
    .footer-title {
      padding: 100px 20px 80px; 
      width: 100%;
      text-align: center;
    }

    .footer-info {
      font-family: "mogra", sans-serif;
      font-weight: 400;
      font-size: 1.5rem; 
      line-height: 1.4;
      display: inline-block;
    }

    /* 링크 스타일 초기화 */
    .footer-info a {
      color: inherit;
      text-decoration: none;
      cursor: pointer;
    }
    .footer-info a:hover { color:rgb(255, 255, 255)}

    .gap-nh { margin-right: 0.1em; }

    /* --- 모바일 화살표 버튼 --- */
    .nav-btn { display: none; }

    /* --- 태블릿/좁은 PC: 2열로 변경 --- */
    @media (max-width: 1024px) and (min-width: 601px) {
      .book-grid {
        grid-template-columns: repeat(2, min-content);
        column-gap: 6vw;
      }
      .book-item {
        height: 45vw; 
      }
    }

    /* --- 모바일 1열 슬라이드 --- */
    @media (max-width: 600px) {
      .header-sticky { padding: 50px 10px 10px; }
      .hero-title { font-size: 9.5vw; }
      
      .content-area { 
        padding-top: 60px; 
        flex: none; 
      }
      
      .book-grid {
        display: flex; 
        flex-wrap: nowrap;
        justify-content: flex-start;
        overflow-x: auto; 
        scroll-snap-type: x mandatory; 
        -webkit-overflow-scrolling: touch;
        padding: 0; 
        gap: 0; 
        width: 100vw;
        scrollbar-width: none;
      }
      .book-grid::-webkit-scrollbar { display: none; }

      .book-item {
        flex: 0 0 100vw; 
        height: 55vh; 
        width: 100vw;
        scroll-snap-align: center;
        padding: 0 45px; 
        display: flex;
        align-items: center; 
        justify-content: center;
        position: relative; 
      }

      .book-item img {
        height: auto;
        max-height: 100%;
        width: auto;
        max-width: 100%;
        object-fit: contain;
      }

      .nav-btn {
        display: flex;
        position: absolute;
        top: calc(60px + 27.5vh); 
        transform: translateY(-50%);
        font-family: "mogra", sans-serif;
        font-size: 30px;
        color: var(--color-text);
        background: none;
        border: none;
        z-index: 1000;
        cursor: pointer;
        opacity: 0.6;
        padding: 10px;
      }
      .btn-prev { left: 5px; position: fixed; } 
      .btn-next { right: 5px; position: fixed; } 

      .footer-title { 
        padding: 20px 20px 80px; 
      }
      .footer-info { 
        font-size: 1.0rem; 
        padding-top: 40px;
      }
    }
  </style>
</head>
<body>

  <header class="header-sticky">
    <h1 class="hero-title">HA<span class="gap-nh">N</span>HARIM</h1>
  </header>

  <main class="content-area">
    <button class="nav-btn btn-prev" onclick="scrollGrid(-1)">&lt;</button>
    <button class="nav-btn btn-next" onclick="scrollGrid(1)">&gt;</button>

    <div class="book-grid" id="bookGrid">
      <div class="book-item"><img src="image/cover0002.jpg" alt="Book 1"></div>
      <div class="book-item"><img src="image/cover0003.jpg" alt="Book 2"></div>
      <div class="book-item"><img src="image/cover0004.jpg" alt="Book 3"></div>
      <div class="book-item"><img src="image/cover0018.jpg" alt="Book 6"></div>
      <div class="book-item"><img src="image/cover0016.jpg" alt="Book 6"></div>
      <div class="book-item"><img src="image/cover0007.jpg" alt="Book 6"></div>
      <div class="book-item"><img src="image/cover0005.jpg" alt="Book 4"></div>
      <div class="book-item"><img src="image/cover0006.jpg" alt="Book 5"></div>
      <div class="book-item"><img src="image/cover0008.jpg" alt="Book 7"></div>
      <div class="book-item"><img src="image/cover0009.jpg" alt="Book 8"></div>
      <div class="book-item"><img src="image/cover0010.jpg" alt="Book 9"></div>
      <div class="book-item"><img src="image/cover0017.jpg" alt="Book 10"></div>
      <div class="book-item"><img src="image/cover0011.jpg" alt="Book 10"></div>
      <div class="book-item"><img src="image/cover0013.jpg" alt="Book 12"></div>
      <div class="book-item"><img src="image/cover0012.jpg" alt="Book 11"></div>    </div>
  </main>

  <footer class="footer-title">
    <div class="footer-info">
      Book Designer<br>
      rimhahan@gmail.com<br>
      <a href="https://www.instagram.com/lessspicy/" target="_blank" rel="noopener noreferrer">@lessspicy</a>
    </div>
  </footer>

  <script>
    function scrollGrid(direction) {
      const grid = document.getElementById('bookGrid');
      const scrollAmount = window.innerWidth; 
      grid.scrollBy({
        left: direction * scrollAmount,
        behavior: 'smooth'
      });
    }
  </script>

</body>
</html>
