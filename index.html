  <style>
    :root {

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      text-align: center;

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden; /* 가로 스크롤만 방지 */
}

    /* ── 패널 열린 상태 ── */
    body.panel-open {
      overflow: hidden !important;
      height: 100vh !important;
      position: fixed;
      width: 100%;
    }

    /* ── 스크롤바 스타일 ── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.3); border-radius: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb:hover {
    /* 마우스를 올렸을 때만 조금 더 진하게(투명도 50%) 보여줍니다 */
     background-color: rgba(255, 255, 255, 0.1); 
}

/* 파이어폭스 대응 */
* {
  scrollbar-width: thin;
  scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
}
    /* 사이드 패널 내부 스크롤바: 더 짧게 보이도록 */
    .side-panel::-webkit-scrollbar { width: 3px; }
    .side-panel::-webkit-scrollbar-thumb {
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      /* thumb 최소 높이를 줄여 짧게 보이게 */
      min-height: 30px;
    }
    .side-panel::-webkit-scrollbar-track {
      background: transparent;

      margin: 100px 0 50px;
    }

    /* ── Header ── */
    .header-sticky {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding-top: var(--header-top);
      z-index: 400;
      pointer-events: none;
      display: flex;
      justify-content: center;
      container-type: inline-size;
    }

    /* 상단 로고(HANHARIM) 스타일 */
.hero-title {
  width: 100%;
  box-sizing: border-box;
  padding: 0 4%; /* 이 수치로 전체 폭을 조절 (값이 커질수록 글자들이 중앙으로 모임) */
  margin: 0;
  pointer-events: auto;
  text-align: center;
}

/* ★ 핵심: h1 자체가 아니라 내부의 a 태그를 flex로 만듭니다 */
.hero-title a { 
  display: flex !important;
  justify-content: space-between; /* 글자들을 양 끝으로 벌림 */
  align-items: center;
  width: 100%;
  
  color: inherit; 
  text-decoration: none; 
  text-transform: uppercase;
  
  /* 폰트 설정 */
  font-family: "Codystar", sans-serif;
  font-weight: 400;
  font-size: 5cqi; /* 상단 타이틀 폰트 크기. 양끝맞춤은 유지됨 */
  line-height: var(--lh-hero);
}

/* 혹시 모를 글자 줄바꿈 방지 */
.hero-title span {
  display: inline-block;
  white-space: nowrap;
}

    /* ── Scaffold ── */
    .page-wrapper {
      display: flex;
      flex: 1;
      flex-direction: column;
      padding-top: calc(var(--header-top) + clamp(24px, 9vw, 90px) * 0.9 + 25px);
    }

    .main-col {
      width: 100%;
      transition: opacity 0.4s ease;
    }
    body.panel-open .main-col { opacity: 0; pointer-events: none; }

    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      margin-top: 30px;
    }

    /* ── Grid ── */
    .book-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      column-gap: var(--gap-col);
      row-gap: var(--gap-row);
      width: calc(100% - var(--side-pad) * 2);
      max-width: 1200px;
      margin: 0 auto;
      align-items: end;
    }

    .book-item { display: flex; justify-content: center; align-items: flex-end; width: 100%; cursor: pointer; }
    .book-item img {
      max-width: 100%;
      height: auto;
      display: block;
      transition: transform 0.35s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.35s ease;
      border-radius: 0;
    }
    .book-item:hover img {
      transform: scale(1.04);
      box-shadow:
        0 0 10px 0px rgba(253, 125, 181, 0.7),
        0 0 25px 5px rgba(253, 125, 181, 0.4),
        0 0 50px 15px rgba(253, 125, 181, 0.2);
    }

    /* ── Side Panel ── */
    .side-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background-color: var(--color-bg);
      z-index: 300;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    body.panel-open .side-panel { opacity: 1; visibility: visible; }

   .side-panel-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 700px;
  width: 100%;
  margin: 0 auto;

  /* 핵심: PC에서 로고 아래로 확실히 밀어내기 (숫자를 더 키우셔도 됩니다) */
  padding-top: 150px !important;  /*pc버전 로고 밑, 이미지 위 여백!! */
  padding-bottom: 150px !important;
  padding-left: clamp(40px, 5%, 80px) !important;
  padding-right: clamp(40px, 5%, 80px) !important;
  min-height: 100%;
}

    .panel-close {
      position: fixed;
      top: var(--header-top);
      right: 5vw;
      background: none;
      border: none;
      cursor: pointer;
      width: 32px;
      height: 32px;
      z-index: 500;
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body.panel-open .panel-close { opacity: 1; }

.panel-slider {
  width: 100%;
  max-width: 500px;  /* 기본: 세로 표지용 */
  position: relative;
  margin-bottom: 50px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 가로 이미지일 때 슬라이더 넓히기 */
.panel-slider.is-landscape {
  max-width: min(90vw, 900px);  /* 패딩 무시하고 뷰포트 기준으로 넓어짐 */
  width: min(90vw, 900px);
}

.panel-slider:active { cursor: grabbing; }
.panel-slider-track {
display: grid;         /* 이미지를 겹치기 위해 grid 사용 */
  place-items: center;
  width: 100%;
  position: relative;
}

.panel-slider-track img {
grid-area: 1 / 1;
  width: 100%;
  height: auto;
  max-height: 75vh;
  object-fit: contain;
  opacity: 0;
  pointer-events: none; 
  transition: opacity 0s ease-in-out;
}

.panel-slider-track img.active {
  opacity: 1;
  pointer-events: auto;
}

.panel-slider-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 20px;
}
.panel-slider-dots span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--color-text);
  opacity: 0.3;
  transition: opacity 0.2s;
  cursor: pointer;
}
.panel-slider-dots span.active { opacity: 1; }

/* 이미지 1장이면 dots 숨김 */
.panel-slider-dots:has(span:only-child) { display: none; }

    .panel-divider {
      width: 100%;
      height: 0px;
      border-top: 1px solid var(--color-divider);
      background: var(--color-divider);
      margin-top: 35px;
      margin-bottom: 5px;
    }

    .panel-section { width: 100%; text-align: left; }

    .panel-title-text .series {
      display: block;
      font-size: 0.4em;
      font-weight: 500;
      letter-spacing: 0.0em;
      margin-top: 8px;
      margin-bottom: 2px;
      color: var(--color-text);
    }
    
    .panel-title-text {
      font-family: "minsans", sans-serif;
      font-size: 2.2rem;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: 0.0em;
      margin-top: 0px;
    }

    .panel-title-text small {
      display: block;
      font-size: 0.6em;
      font-weight: 600;
      margin-top: 6px;
      line-height: 1.3;
      letter-spacing: 0.0em;
      opacity: 1;
    }
    
    .panel-meta, .panel-desc, .panel-author {
      font-family: "minsans", sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      line-height: 1.7;
      opacity: 1;
      text-align: left;
      word-break: keep-all;
    }

    .panel-meta b, .panel-desc b, .panel-author b { font-weight: 600; }
    .panel-meta p, .panel-desc p, .panel-author p { margin: 0; }
    .panel-meta p + p, .panel-desc p + p, .panel-author p + p { margin-top: 0.6em; }

/* 1. 기존 .mobile-back-btn 스타일을 아래와 같이 수정 */
.mobile-back-btn {
  position: relative; 
  display: flex;         /* 아이콘 중앙 정렬 */
  align-items: center;
  justify-content: center;
  margin: 60px auto 0;   /* 위쪽 여백 60px */
  width: 50px;           /* 클릭하기 넉넉한 크기 */
  height: 50px;
  cursor: pointer;
  z-index: 1000;         /* 다른 요소보다 위로 */
  
  /* 패널이 열렸을 때만 보이도록 */
  visibility: visible;    
  pointer-events: auto;  
}

/* 2. 패널 열렸을 때 설정 */
.panel-open .mobile-back-btn {
  visibility: visible;

      0%   { background-position: 100% 0; }

    @media (max-width: 1100px) {

.book-item:hover img,

/* ── 2. 기본 설정 및 요소 참조 ── */
const grid = document.getElementById('bookGrid');
const sidePanel = document.getElementById('sidePanel');
const sliderTrack = document.getElementById('panelSliderTrack');
const sliderDots = document.getElementById('panelSliderDots');

let currentSlide = 0;
let sliderImages = [];

/* ── 3. 공통 함수: 텍스트 변환 ── */
function parseText(str) {
  if (!str) return "";
  return str
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/\[m\]/g, '<br class="m-br">')
    .replace(/\[s\]/g, '<span class="text-spacer"></span>')
    .replace(/\n/g, '<br>');
}

/* ── 4. 상세 패널 제어 (열기/닫기/뒤로가기) ── */
function openPanel(index) {
  const book = BOOKS[index];
  if (!book) return;

  // 슬라이더 초기화
  initSlider(book.images || [book.src]);

  // 텍스트 데이터 매핑
  document.getElementById('panelTitle').innerHTML = parseText(book.title);
  document.getElementById('panelMeta').innerHTML = parseText(book.meta);
  document.getElementById('panelDesc').innerHTML = parseText(book.desc);
  document.getElementById('panelAuthor').innerHTML = parseText(book.author);

  // 브라우저 기록 추가 (뒤로가기 활성화)
  if (!history.state || history.state.index !== index) {
    history.pushState({ panel: 'open', index: index }, '', `?index=${index}`);
  }

  // 화면 고정 및 패널 표시
  const scrollY = window.scrollY;
  document.body.style.position = 'fixed';
  document.body.style.top = `-${scrollY}px`;
  document.body.style.width = '100%';
  document.body.classList.add('panel-open');
  sidePanel.scrollTo(0, 0);
}

function actualClose() {
  const scrollY = document.body.style.top;
  document.body.style.position = '';
  document.body.style.top = '';
  document.body.style.width = '';
  document.body.classList.remove('panel-open');
  window.scrollTo(0, parseInt(scrollY || '0') * -1);
}

function closePanel() {
  if (window.location.search.includes('index=')) {
    history.back(); // 주소창에 index가 있으면 뒤로가기로 닫기
  } else {
    actualClose();
  }
}

/* ── 5. 슬라이더 기능 (페이드 방식) ── */
function initSlider(images) {
  sliderImages = images;
  currentSlide = 0;
  sliderTrack.innerHTML = '';
  sliderDots.innerHTML = '';
  
  images.forEach((src, i) => {
    const img = document.createElement('img');
    img.src = src;
    img.style.cursor = 'pointer';
    // 이미지 클릭 시 다음 사진으로 페이드 전환
    img.addEventListener('click', () => {
      currentSlide = (currentSlide + 1) % sliderImages.length;
      updateSlider();
    });
    sliderTrack.appendChild(img);

    const dot = document.createElement('span');
    if (i === 0) dot.classList.add('active');
    dot.addEventListener('click', (e) => {
      e.stopPropagation(); // 이미지 클릭 이벤트 방해 금지
      currentSlide = i;
      updateSlider();
    });
    sliderDots.appendChild(dot);
  });
  updateSlider();
}

function updateSlider() {
  const imgs = sliderTrack.querySelectorAll('img');
  imgs.forEach((img, i) => {
    img.classList.toggle('active', i === currentSlide);
  });
 
    // ★ 현재 슬라이드 이미지 비율 체크 → 슬라이더 너비 조정
  const activeImg = sliderTrack.querySelectorAll('img')[currentSlide];
  if (activeImg) {
    const checkRatio = () => {
      const slider = document.getElementById('panelSlider');
      if (activeImg.naturalWidth && activeImg.naturalHeight) {
        const isLandscape = activeImg.naturalWidth > activeImg.naturalHeight;
        slider.classList.toggle('is-landscape', isLandscape);
      }
    };
    if (activeImg.complete) checkRatio();
    else activeImg.addEventListener('load', checkRatio, { once: true });
  }

  const dots = sliderDots.querySelectorAll('span');
  dots.forEach((dot, i) => {
    dot.classList.toggle('active', i === currentSlide);
  });
}

/* ── 6. 이벤트 리스너 실행 ── */

// [중요] 메인 화면에 책 리스트 생성 (함수들이 정의된 후 실행)
BOOKS.forEach((book, index) => {
  const div = document.createElement('div');
  div.className = 'book-item';
  div.innerHTML = `<img src="${book.src}" alt="${book.title}">`;
  div.addEventListener('click', () => openPanel(index));
  grid.appendChild(div);
});

window.addEventListener('popstate', (e) => {
  if (e.state && e.state.panel === 'open') {
    openPanel(e.state.index);
  } else {
    actualClose();
  }
});
const closeBtn = document.getElementById('panelClose');
const mobileBtn = document.getElementById('mobileBack');
if (closeBtn) closeBtn.addEventListener('click', closePanel);
if (mobileBtn) mobileBtn.addEventListener('click', closePanel);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
// Shimmer (Instagram)
document.querySelectorAll('.shimmer-link').forEach(link => {
  link.addEventListener('click', function() {
    this.classList.remove('shimmer-active');
    void this.offsetWidth; 
    this.classList.add('shimmer-active');});
});
    if (window.location.search) {
      history.replaceState(null, '', window.location.pathname);
    };
  </script>
