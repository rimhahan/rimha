<!DOCTYPE html>
<html>
<head>
  <title>@lessspicy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
    (function(d) {
      var config = { kitId: 'eer4nif', scriptTimeout: 3000, async: true },
      h=d.documentElement,t=setTimeout(function(){h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";},config.scriptTimeout),tk=d.createElement("script"),f=false,s=d.getElementsByTagName("script")[0],a;h.className+=" wf-loading";tk.src='https://use.typekit.net/'+config.kitId+'.js';tk.async=true;tk.onload=tk.onreadystatechange=function(){a=this.readyState;if(f||a&&a!="complete"&&a!="loaded")return;f=true;clearTimeout(t);try{Typekit.load(config)}catch(e){}};s.parentNode.insertBefore(tk,s)
    })(document);
  </script>

  <style>
    body {
      font-family: "jttgattaeeonangirin", sans-serif;
      font-weight: 100;
      background-color: #4f413c;
      margin: 0;
      padding-top: 40px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      margin: 0 auto;
      gap: 20px;
    }

    .card {
      background-color: #4f413c;
      padding: 25px 20px;
      text-decoration: none;
      display: block;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .card p {
      color: rgb(255, 255, 255);
      font-size: 120px;
      font-weight: 100;
      letter-spacing: -0.02em;
      line-height: 1.5; /* 원본 유지 */
      margin: 0;
      text-align: center;
      word-break: keep-all;
      white-space: nowrap; 
    }

    .card.long-title p {
      white-space: normal; 
      line-height: 1.3; /* 원본 유지 */
    }

    .card:hover p { color: #f9a8db; }
    .card.selected p { color: rgb(212, 255, 182) !important; transition: color 0.4s ease; }

    /* ★ 줄바꿈 클래스 제어 */
    .pc-br { display: none; } /* 기본 PC: 숨김 (2줄) */
    .mo-br { display: block; } /* 항상 켜둠 */

    h2 {
      font-size: 30px;
      text-align: center;
      color: #ffffff;
      margin: 0 auto;
      max-width: 600px;
      padding-top: 50px;
      padding-bottom: 50px;
    }

    /* [PC 중간 폭] 1100px 이하에서 3줄로 변경 */
    @media (max-width: 1100px) and (min-width: 601px) {
      .pc-br { display: block; }
    }

    /* 모바일 환경 (600px 이하) */
    @media (max-width: 600px) {
      body { padding: 15px; padding-top: 40px; }
      .card { width: 100%; padding: 10px; }
      
      .card p {
        font-size: 12vw;
        white-space: nowrap;
      }

      h2 {
        font-size: 14px !important;
        padding-top: 50px !important;
        padding-bottom: 30px !important;
      }

      .card.long-title p {
        white-space: normal !important;
        font-size: 12vw !important; 
        line-height: 1.3;
        padding: 0 10px;
      }

      /* 모바일에서는 모든 줄바꿈 활성화 */
      .pc-br, .mo-br { display: block !important; }
    }
  </style>
</head>
<body>

  <div class="container"><a href="book1.html" class="card"><p>모순</p></a></div>
  <div class="container"><a href="book2.html" class="card"><p>퀸 베이비</p></a></div>
  <div class="container"><a href="book3.html" class="card"><p>랩걸</p></a></div>
  <div class="container"><a href="book4.html" class="card"><p>자발적 고독</p></a></div>

  <div class="container">
    <a href="book5.html" class="card long-title">
      <p>
        색채가 없는 <br class="pc-br">
        다자키 쓰쿠루와 <br class="mo-br"> 
        그가 순례를 떠난 해
      </p>
    </a>
  </div>

  <h2>@lessspicy</h2>
  
  <script>
    /* 1. 주소창 클리닝 (PC/모바일 공통) */
    if (window.history.replaceState) {
        const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
        window.history.replaceState({path: cleanUrl}, '', cleanUrl);
    }

    /* 2. 기존 인터랙션 코드 */
    window.addEventListener('pageshow', function(event) {
      if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
        document.querySelectorAll('.card').forEach(function(card) {
          card.classList.remove('selected');
        });
      }
    });

    window.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.card').forEach(function(card) {
        card.addEventListener('click', function(e) {
          e.preventDefault(); 
          const targetUrl = this.getAttribute('href'); 
          this.classList.add('selected'); 
          setTimeout(function() {
            window.location.href = targetUrl;
          }, 150); 
        });
      });
    });
  </script>
</body>
</html>
