<!DOCTYPE html>
<html>
<head>
  <title>@lessspicy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
    (function(d) {
      var config = { kitId: 'eer4nif', scriptTimeout: 3000, async: true },
      h=d.documentElement,t=setTimeout(function(){h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";},config.scriptTimeout),tk=d.createElement("script"),f=false,s=d.getElementsByTagName("script")[0],a;h.className+=" wf-loading";tk.src='https://use.typekit.net/'+config.kitId+'.js';tk.async=true;tk.onload=tk.onreadystatechange=function(){a=this.readyState;if(f||a&&a!="complete"&&a!="loaded")return;f=true;clearTimeout(t);try{Typekit.load(config)}catch(e){}};s.parentNode.insertBefore(tk,s)
    })(document);
  </script>

  <style>
    body {
      font-family: "jttgattaeeonangirin", sans-serif;
      font-weight: 100;
      background-color: #4f413c; 
      margin: 0;
      padding-top: 40px;
      position: relative; 
      min-height: 100vh;
      overflow-x: hidden; 
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      margin: 0 auto;
      gap: 20px;
      overflow: visible !important; 
    }

    .card {
      background-color: #4f413c;
      padding: 25px 20px;
      text-decoration: none;
      display: block;
      transition: all 0.3s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent; 
      position: relative;
      /* ★ 도서 목록의 층수를 낮게 설정 */
      z-index: 1; 
    }

    .card p {
      color: rgb(255, 255, 255);
      font-size: 60px; 
      font-weight: 100;
      letter-spacing: -0.02em;
      line-height: 1.5;
      margin: 0;
      text-align: center;
      word-break: keep-all;
      white-space: nowrap; 
    }

    .card.long-title p { white-space: normal; line-height: 1.3; }
    .card:hover p { color: #f9a8db; }
    .card.selected p { color: rgb(126, 163, 255) !important; transition: color 0.4s ease; }

    /* ★ 포스트잇 외부 틀 ★ */
    .post-it-card {
      position: absolute; 
      /* ★ 중요: 어떤 요소보다도 무조건 위에 뜨도록 z-index를 최대치로 설정 */
      z-index: 9999 !important; 
      padding: 0 !important;
      /* 포스트잇 영역 밖(여백)이 클릭을 방해하지 않도록 설정 */
      width: 220px; 
      height: 220px;
    }

    .post-it {
      width: 100%;  
      height: 100%; 
      background-color: #f9a8db; 
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      padding: 20px;
      box-sizing: border-box;
      border: none; 
      filter: drop-shadow(10px 10px 15px rgba(0,0,0,0.3));
    }

    .post-it p {
      color: #4f413c !important; 
      white-space: normal !important;
      margin: 0;
      line-height: 1.2;
      font-size: 50px !important; 
      font-weight: 200 !important; 
      transform: translateY(3px); 
    }

    .post-it-card:hover .post-it {
      transform: rotate(var(--current-rot)) scale(1.03) !important; 
      filter: drop-shadow(15px 20px 25px rgba(0,0,0,0.4));
    }

    .post-it-card.selected .post-it {
      opacity: 0.8;
      transform: rotate(var(--current-rot)) scale(0.98) !important; 
    }

    .pc-br { display: none; }
    .mo-br { display: block; }

    h2 {
      font-size: 20px;
      text-align: center;
      color: #f9a8db;
      margin: 0 auto;
      max-width: 600px;
      padding-top: 50px;
      padding-bottom: 50px;
    }

    @media (max-width: 600px) {
      .card p { font-size: 12vw; }
      .post-it-card { width: 160px; height: 160px; }
      .post-it { padding: 15px; }
      .post-it p { 
        font-size: 42px !important; 
        line-height: 1.2 !important;
        transform: translateY(5px); 
      }
      h2 { font-size: 14px !important; padding-top: 30px !important; }
    }
  </style>
</head>
<body>

  <div class="container"><a href="book1.html" class="card"><p>모순</p></a></div>
  <div class="container"><a href="book2.html" class="card"><p>퀸 베이비</p></a></div>
  <div class="container"><a href="book3.html" class="card"><p>랩걸</p></a></div>
  <div class="container"><a href="book4.html" class="card"><p>자발적 고독</p></a></div>

  <a href="collection.html" class="card post-it-card" id="random-post-it">
    <div class="post-it">
      <p>오늘의 <br> 문장</p>
    </div>
  </a>

  <div class="container">
    <a href="book5.html" class="card long-title">
      <p>
        색채가 없는 <br class="pc-br">
        다자키 쓰쿠루와 <br class="mo-br"> 
        그가 순례를 떠난 해
      </p>
    </a>
  </div>

  <h2>@lessspicy</h2>
  
  <script>
    function randomizePostIt() {
      const postIt = document.getElementById('random-post-it');
      if (!postIt) return;

      const x = Math.random() * 65 + 15; 
      const y = Math.random() * 65 + 15; 
      const rotation = (Math.random() - 0.5) * 40; 

      postIt.style.left = `${x}%`;
      postIt.style.top = `${y}%`;
      postIt.style.setProperty('--current-rot', `${rotation}deg`);
      
      const inner = postIt.querySelector('.post-it');
      inner.style.transform = `rotate(${rotation}deg)`;
    }

    // URL 정리
    if (window.history.replaceState) {
        const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
        window.history.replaceState({path: cleanUrl}, '', cleanUrl);
    }

    window.addEventListener('DOMContentLoaded', function() {
      randomizePostIt();

      // 모든 카드(포스트잇 포함)에 클릭 이벤트 적용
      document.querySelectorAll('.card').forEach(function(card) {
        card.addEventListener('click', function(e) {
          const targetUrl = this.getAttribute('href'); 
          if (!targetUrl) return;

          e.preventDefault(); 
          this.classList.add('selected'); 

          setTimeout(function() {
            window.location.href = targetUrl;
          }, 150); 
        });
      });
    });

    window.addEventListener('pageshow', function(event) {
      if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
        document.querySelectorAll('.card').forEach(function(card) {
          card.classList.remove('selected');
        });
      }
    });
  </script>
</body>
</html>
