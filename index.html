  <style>
    :root {
      --color-bg: #000;
      --color-text: #fd7db5;
      --color-divider: #fd7db5;
      --ls-hero: 0.05em;
      --lh-hero: 0.9;
      --gap-col: 4vw;
      --gap-row: 5vw;
      --side-pad: 5vw;
      --header-top: 50px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      text-align: center;
    }

    body.panel-open { overflow: hidden; }

    /* ── Header ── */
    .header-sticky {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding-top: var(--header-top);
      z-index: 400;
      pointer-events: none;
      display: flex;
      justify-content: center;
    }

    .hero-title {
      font-family: "duckie", sans-serif;
      font-weight: 400;
      font-size: clamp(24px, 9vw, 90px);
      text-transform: uppercase;
      letter-spacing: var(--ls-hero);
      line-height: var(--lh-hero);
      pointer-events: auto;
      padding: 0 5vw;
      white-space: nowrap;
    }
    .hero-title a { color: inherit; text-decoration: none; }

    /* ── Scaffold ── */
    .page-wrapper {
      display: flex;
      flex: 1;
      flex-direction: column;
      padding-top: calc(var(--header-top) + clamp(24px, 9vw, 90px) * 0.9 + 25px);
    }

    .main-col {
      width: 100%;
      transition: opacity 0.4s ease;
    }
    body.panel-open .main-col { opacity: 0; pointer-events: none; }

    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      margin-top: 50px;
    }

    /* ── Grid ── */
    .book-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      column-gap: var(--gap-col);
      row-gap: var(--gap-row);
      width: calc(100% - var(--side-pad) * 2);
      max-width: 1200px;
      margin: 0 auto;
      align-items: end;
    }

    .book-item { display: flex; justify-content: center; align-items: flex-end; width: 100%; cursor: pointer; }
    .book-item img {
      max-width: 100%;
      height: auto;
      display: block;
      transition: transform 0.35s cubic-bezier(0.34,1.4,0.64,1);
    }
    .book-item:hover img { transform: scale(1.04); }

    /* ── Side Panel ── */
    .side-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background-color: var(--color-bg);
      z-index: 300;
      overflow-y: auto;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    body.panel-open .side-panel { opacity: 1; visibility: visible; }

    .side-panel-inner {
      padding: calc(var(--header-top) + clamp(24px, 9vw, 90px) * 0.9 + 90px) 10% 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 950px;
      margin: 0 auto;
    }

    .panel-close {
      position: fixed;
      top: var(--header-top);
      right: 5vw;
      background: none;
      border: none;
      cursor: pointer;
      width: 32px;
      height: 32px;
      z-index: 500;
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body.panel-open .panel-close { opacity: 0.8; }

    .panel-book-img { width: 100%; max-width: 400px; height: auto; margin-bottom: 50px; }

    .panel-divider {
      width: 100%;
      height: 1px;
      background: var(--color-divider);
      margin-top: 40px;
      margin-bottom: 10px;
    }

    .panel-section { width: 100%; text-align: left; }

    .panel-title-text {
      font-family: "minsans", sans-serif;
      font-size: 2.2rem;
      font-weight: 600;
      line-height: 1.1;
      margin-top: 5px;
    }

    .panel-meta, .panel-desc, .panel-author {
      font-family: "minsans", sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      line-height: 1.7;
      opacity: 0.8;
      text-align: left;
      word-break: keep-all;
    }

    .panel-meta b, .panel-desc b, .panel-author b {
      font-weight: 800;
    }

    /* 줄바꿈용 */
    .panel-meta p, .panel-desc p, .panel-author p {
      margin: 0;
    }
    .panel-meta p + p, .panel-desc p + p, .panel-author p + p {
      margin-top: 0.6em;
    }

    .mobile-back-btn {
      display: none;
      cursor: pointer;
      margin-top: 90px;
      margin-bottom: -40px;
      opacity: 0.6;
      width: 32px;
      height: 32px;
    }

    .footer-title { padding: 100px 20px 80px; width: 100%; text-align: center; }
    .footer-info {
      font-family: "mogra", sans-serif;
      font-size: 1.5rem;
      line-height: 1.4;
      display: inline-block;
    }
    .footer-info a { color: inherit; text-decoration: none; }
    .gap-nh { margin-right: 0.1em; }

    /* ── @lessspicy shimmer ── */
    .shimmer-link {
      position: relative;
      display: inline-block;
      color: var(--color-text);
      text-decoration: none;
      background: linear-gradient(
        120deg,
        #fd7db5 0%,
        #ffffff 40%,
        #ffb8d9 55%,
        #fd7db5 100%
      );
      background-size: 250% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-position: 100% 0;
    }
    .shimmer-link:hover,
    .shimmer-link.shimmer-active {
      animation: shimmerMove 0.75s ease forwards;
    }

    @keyframes shimmerMove {
      0%   { background-position: 100% 0; }
      100% { background-position: 0% 0; }
    }

    /* ── 반응형 ── */
    @media (max-width: 1100px) {
      .book-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      :root { --header-top: 30px; --gap-row: 13vw; }
      .hero-title { font-size: 10.5vw; }
      .page-wrapper { padding-top: calc(var(--header-top) + 9vw + 20px); }
      .book-grid { grid-template-columns: 1fr; width: 85%; }
      .footer-info { font-size: 1.1rem; }
      .panel-close { display: none !important; }
      .mobile-back-btn { display: flex; align-items: center; justify-content: center; }
      .side-panel-inner { padding-top: 130px; }
    }

    /* **텍스트** → <b>텍스트</b>, \n → <br> 으로 변환 */
    function parseText(str) {
      return str
        .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
        .replace(/\n/g, '<br>');
    }

    /* 그리드 자동 생성 */
    const grid = document.getElementById('bookGrid');
    BOOKS.forEach(book => {
      const div = document.createElement('div');
      div.className = 'book-item';
      div.innerHTML = `<img src="${book.src}" alt="${book.title}">`;
      div.addEventListener('click', () => openPanel(book));
      grid.appendChild(div);
    });

    /* ── Panel ── */

    const panelImg   = document.getElementById('panelImg');
    const panelTitle = document.getElementById('panelTitle');
    const panelMeta  = document.getElementById('panelMeta');
    const panelDesc  = document.getElementById('panelDesc');
    const panelAuthor = document.getElementById('panelAuthor');

    function openPanel(book) {
      panelImg.src          = book.src;
      panelTitle.textContent = book.title;
      panelMeta.innerHTML   = parseText(book.meta);
      panelDesc.innerHTML   = parseText(book.desc);
      panelAuthor.innerHTML = parseText(book.author);
      document.body.classList.add('panel-open');
      sidePanel.scrollTo(0, 0);
    }

    function closePanel() {
      document.body.classList.remove('panel-open');
    }

    document.getElementById('mobileBack').addEventListener('click', closePanel);
