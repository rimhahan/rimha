<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HANHARIM</title>
  <link rel="icon" href="image/icon2.png">
  <script>
    (function(d) {
      var config = { kitId: 'eer4nif', scriptTimeout: 3000, async: true },
      h=d.documentElement,t=setTimeout(function(){h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";},config.scriptTimeout),tk=d.createElement("script"),f=false,s=d.getElementsByTagName("script")[0],a;h.className+=" wf-loading";tk.src='https://use.typekit.net/'+config.kitId+'.js';tk.async=true;tk.onload=tk.onreadystatechange=function(){a=this.readyState;if(f||a&&a!="complete"&&a!="loaded")return;f=true;clearTimeout(t);try{Typekit.load(config)}catch(e){}};s.parentNode.insertBefore(tk,s)
    })(document);
  </script>

  <style>
    :root {
      --color-bg: rgb(0, 0, 0);
      --color-text: #fd7db5;
      --ls-hero: 0.05em;
      --lh-hero: 0.9;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      text-align: center; 
    }

    .header-sticky {
      position: sticky;
      top: 0;
      background-color: transparent; 
      padding-top: 70px;
      padding-left: 20px;
      padding-right: 20px;
      z-index: 100;
      pointer-events: none; 
    }
    .header-sticky .hero-title { pointer-events: auto; }

    .hero-title {
      font-family: "duckie", sans-serif;
      font-weight: 400;
      font-size: clamp(24px, 9vw, 100px); 
      text-transform: uppercase;
      letter-spacing: var(--ls-hero);
      line-height: var(--lh-hero);
      width: 100%;
      /* --- 다시 한 줄로 고정 --- */
      white-space: nowrap;
    }

    .hero-title a { color: inherit; text-decoration: none; }

    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      position: relative; 
      margin-top: 80px; 
    }

    .book-grid {
      display: grid;
      grid-template-columns: repeat(3, min-content); 
      justify-content: center; 
      column-gap: 3vw;  
      row-gap: 5vw;     
      max-width: 1400px; 
      width: 100%;
      margin: 0 auto; 
      align-items: end; 
    }

    .book-item {
      display: flex;
      justify-content: center; 
      align-items: flex-end;
      height: 35vw; 
      max-height: 540px; 
      min-height: 250px;
    }
    .book-item img { height: 100%; width: auto; display: block; }

    .footer-title { padding: 100px 20px 80px; width: 100%; text-align: center; }
    .footer-info { font-family: "mogra", sans-serif; font-weight: 400; font-size: 1.5rem; line-height: 1.4; display: inline-block; }
    .footer-info a { color: inherit; text-decoration: none; }
    .footer-info a:hover { color:rgb(255, 255, 255)}
    .gap-nh { margin-right: 0.1em; }

    /* --- 모바일 세로 스크롤 및 타이틀 한 줄 고정 --- */
    @media (max-width: 600px) {
      .header-sticky { padding-top: 30px; }
      
      .hero-title { 
        /* 12vw에서 한 줄로 들어오는 최대치인 10.5vw 정도로 조정했습니다. */
        /* 만약 여전히 'M'이 떨어진다면 숫자를 10, 9.5 순으로 조금씩 줄여보세요. */
        font-size: 10.5vw; 
        line-height: var(--lh-hero);
      }
      
      .content-area { margin-top: 40px; flex: none; }
      
      .book-grid {
        display: flex; 
        flex-direction: column; 
        align-items: center;
        gap: 80px; 
        width: 100%;
      }

      .book-item {
        width: 100%;
        height: auto;
        padding: 0 40px;
      }

      .book-item img {
        width: 100%;
        height: auto;
        max-width: 320px;
      }

      .footer-title { padding: 80px 20px 80px; }
      .footer-info { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <header class="header-sticky">
    <h1 class="hero-title">
      <a href="https://lessspicy.o-r.kr/">HA<span class="gap-nh">N</span>HARIM</a>
    </h1>
  </header>

  <main class="content-area">
    <div class="book-grid">
      <div class="book-item"><img src="image/cover0002.jpg"></div>
      <div class="book-item"><img src="image/cover0003.jpg"></div>
      <div class="book-item"><img src="image/cover0004.jpg"></div>
      <div class="book-item"><img src="image/cover0018.jpg"></div>
      <div class="book-item"><img src="image/cover0016.jpg"></div>
      <div class="book-item"><img src="image/cover0007.jpg"></div>
      <div class="book-item"><img src="image/cover0005.jpg"></div>
      <div class="book-item"><img src="image/cover0006.jpg"></div>
      <div class="book-item"><img src="image/cover0008.jpg"></div>
      <div class="book-item"><img src="image/cover0009.jpg"></div>
      <div class="book-item"><img src="image/cover0010.jpg"></div>
      <div class="book-item"><img src="image/cover0017.jpg"></div>
      <div class="book-item"><img src="image/cover0011.jpg"></div>
      <div class="book-item"><img src="image/cover0013.jpg"></div>
      <div class="book-item"><img src="image/cover0012.jpg"></div>
    </div>
  </main>

  <footer class="footer-title">
    <div class="footer-info">
      Book Designer<br>
      rimhahan@gmail.com<br>
      <a href="https://www.instagram.com/lessspicy/" target="_blank">@lessspicy</a>
    </div>
  </footer>

</body>
</html>
