      h=d.documentElement,t=setTimeout(function(){h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";},config.scriptTimeout),tk=d.createElement("script"),f=false,s=d.getElementsByTagName("script")[0],a;h.className+=" wf-loading";tk.src='https://use.typekit.net/'+config.kitId+'.js';tk.async=true;tk.onload=tk.onreadystatechange=function(){a=this.readyState;if(f||a&&a!="complete"&&a!="loaded")return;f=true;clearTimeout(t);try{Typekit.load(config)}catch(e){}};s.parentNode.insertBefore(tk,s)

  <style>
    :root {
      --color-bg: #000;
      --color-text: #fd7db5;
      --color-divider: #fd7db5;
      --ls-hero: 0.05em;
      --lh-hero: 0.9;
      --gap-col: 4vw;
      --gap-row: 5vw;
      --side-pad: 5vw;
      --header-top: 50px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      text-align: center;
    }

    body.panel-open { overflow: hidden; }

    /* ── Header ── */
    .header-sticky {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding-top: var(--header-top);
      z-index: 400;
      pointer-events: none;
      display: flex;
      justify-content: center;
    }

    .hero-title {
      font-family: "duckie", sans-serif;
      font-weight: 400;
      font-size: clamp(24px, 9vw, 90px);
      text-transform: uppercase;
      letter-spacing: var(--ls-hero);
      line-height: var(--lh-hero);
      pointer-events: auto;
      padding: 0 5vw;
      white-space: nowrap;
    }
    .hero-title a { color: inherit; text-decoration: none; }

    /* ── Scaffold ── */
    .page-wrapper {
      display: flex;
      flex: 1;
      flex-direction: column;
      padding-top: calc(var(--header-top) + clamp(24px, 9vw, 90px) * 0.9 + 25px);
    }

    .main-col {
      width: 100%;
      transition: opacity 0.4s ease;
    }
    body.panel-open .main-col { opacity: 0; pointer-events: none; }

    .content-area { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      width: 100%; 
      margin-top: 50px;
    }

    /* ── Grid ── */
    .book-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      column-gap: var(--gap-col);
      row-gap: var(--gap-row);
      width: calc(100% - var(--side-pad) * 2);
      max-width: 1200px;
      margin: 0 auto;
      align-items: end;
    }

    .book-item { display: flex; justify-content: center; align-items: flex-end; width: 100%; cursor: pointer; }
    .book-item img {
      max-width: 100%;
      height: auto;
      display: block;
      transition: transform 0.35s cubic-bezier(0.34,1.4,0.64,1);
    }
    .book-item:hover img { transform: scale(1.04); }

    /* ── Side Panel ── */
    .side-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background-color: var(--color-bg);
      z-index: 300;
      overflow-y: auto;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    body.panel-open .side-panel { opacity: 1; visibility: visible; }

    .side-panel-inner {
      padding: calc(var(--header-top) + clamp(24px, 9vw, 90px) * 0.9 + 90px) 10% 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 800px;
      margin: 0 auto;
    }

    .panel-close {
      position: fixed;
      top: var(--header-top);
      right: 5vw;
      background: none;
      border: none;
      cursor: pointer;
      width: 32px;
      height: 32px;
      z-index: 500;
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body.panel-open .panel-close { opacity: 0.8; }

    .panel-book-img { width: 100%; max-width: 400px; height: auto; margin-bottom: 50px; }

    /* ── 구분선 및 여백 조절 ── */
    .panel-divider { 
      width: 100%; 
      height: 1px; 
      background: var(--color-divider); 
      opacity: 1; 
      margin-top: 40px; 
      margin-bottom: 0px; 
    }

    .panel-section { width: 100%; text-align: left; }
    
    .panel-label { 
      font-family: "minsans", sans-serif; 
      font-size: 0.65rem; 
      letter-spacing: 0.14em; 
      text-transform: uppercase; 
      opacity: 1.0; 
      margin-top: 0px; 
      margin-bottom: 15px; 
    }

    .panel-title-text { 
      font-family: "minsans", sans-serif; 
      font-size: 2.2rem; 
      font-weight: 500;
      line-height: 1.1; 
      margin-top: 10px; 
    }
    
    .panel-meta, .panel-desc, .panel-author { 
      font-family: "minsans", sans-serif; 
      font-size: 0.95rem; 
      font-weight: 400; 
      line-height: 1.7; 
      opacity: 0.8; 
      text-align: left; 
      word-break: keep-all; 
      white-space: pre-line; 
    }

    .panel-desc b, .panel-author b {
      font-weight: 700;
      opacity: 1;
    }

    .mobile-back-btn {
      display: none;
      cursor: pointer;
      margin-top: 90px;
      margin-bottom: -40px;
      opacity: 0.6;
      width: 32px;
      height: 32px;
    }

    .footer-title { padding: 100px 20px 80px; width: 100%; text-align: center; }
    .footer-info { 
      font-family: "mogra", sans-serif;
      font-size: 1.5rem; 
      line-height: 1.4; 
      display: inline-block; 
    }
    .footer-info a { color: inherit; text-decoration: none; }
    .gap-nh { margin-right: 0.1em; }

    /* ── 반응형 ── */
    @media (max-width: 1100px) {
      .book-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      :root { --header-top: 30px; --gap-row: 13vw; }
      .hero-title { font-size: 10.5vw; }
      .page-wrapper { padding-top: calc(var(--header-top) + 9vw + 20px); }
      .book-grid { grid-template-columns: 1fr; width: 85%; }
      .footer-info { font-size: 1.1rem; }
      .panel-close { display: none !important; }
      .mobile-back-btn { display: flex; align-items: center; justify-content: center; }
      .side-panel-inner { padding-top: 130px; } 
    }
  </style>

  <script>
    const bookItems = document.querySelectorAll('.book-item');
    const sidePanel = document.getElementById('sidePanel');
    const panelClose = document.getElementById('panelClose');
    const panelImg = document.getElementById('panelImg');
    const panelTitle = document.getElementById('panelTitle');
    const panelMeta = document.getElementById('panelMeta');
    const panelDesc = document.getElementById('panelDesc');
    const panelAuthor = document.getElementById('panelAuthor');

    function openPanel(item) {
      panelImg.src = item.dataset.src;
      panelTitle.innerHTML = item.dataset.title;
      panelMeta.innerHTML = item.dataset.meta;
      panelDesc.innerHTML = item.dataset.desc;
      panelAuthor.innerHTML = item.dataset.author;
      document.body.classList.add('panel-open');
      sidePanel.scrollTo(0, 0);
    }

    function closePanel() {
      document.body.classList.remove('panel-open');
    }

    bookItems.forEach(item => item.addEventListener('click', () => openPanel(item)));
    panelClose.addEventListener('click', closePanel);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
  </script>
