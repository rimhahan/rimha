<!DOCTYPE html>
<html>
<head>
  <title>@lessspicy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
    (function(d) {
      var config = { kitId: 'eer4nif', scriptTimeout: 3000, async: true },
      h=d.documentElement,t=setTimeout(function(){h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";},config.scriptTimeout),tk=d.createElement("script"),f=false,s=d.getElementsByTagName("script")[0],a;h.className+=" wf-loading";tk.src='https://use.typekit.net/'+config.kitId+'.js';tk.async=true;tk.onload=tk.onreadystatechange=function(){a=this.readyState;if(f||a&&a!="complete"&&a!="loaded")return;f=true;clearTimeout(t);try{Typekit.load(config)}catch(e){}};s.parentNode.insertBefore(tk,s)
    })(document);
  </script>

  <style>
    body {
      font-family: "jttgattaeeonangirin", sans-serif;
      font-weight: 100;
      background-color: #4d8bff;
      margin: 0;
      padding-top: 40px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      margin: 0 auto;
      gap: 20px;
    }

    .card {
      background-color: #4d8bff;
      padding: 25px 20px;
      text-decoration: none;
      display: block;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .card p {
      color: rgb(255, 255, 255);
      font-size: 120px; /* PC 기본 크기 */
      font-weight: 100;
      letter-spacing: -0.02em;
      line-height: 1.5;
      margin: 0;
      text-align: center;
      word-break: keep-all;
      white-space: nowrap; /* 기본은 줄바꿈 금지 */
    }

    /* 5번 카드 전용: 다른 카드와 크기는 같되 줄바꿈만 허용 */
    .card.long-title p {
      white-space: normal; 
      line-height: 1.3;
    }

    .card:hover p { color: rgb(212, 255, 182); }
    .card.selected p { color: rgb(255, 203, 252) !important; transition: color 0.4s ease; }

    .mo-only { display: none; }
    .pc-only { display: inline; }

      h2 {
      font-size: 30px;
      text-align: center;
      color: #ffffff;
      margin: 0 auto;
      max-width: 600px;
      padding-top: 50px;
      padding-bottom: 50px;
    }

    /* 모바일 환경 (600px 이하) */
    @media (max-width: 600px) {
      body { padding: 15px; padding-top: 40px; }
      .card { width: 100%; padding: 10px; }
      
      .card p {
        font-size: 12vw; /* 모바일 공통 크기 */
        white-space: nowrap;
      }

      .card.long-title p {
        white-space: normal !important;
        font-size: 12vw !important; /* 다른 카드와 크기 동일하게 유지 */
        line-height: 1.3;
        padding: 0 10px;
      }

      .mo-only { display: inline !important; }
      .pc-only { display: none !important; }
      
      .card:active { transform: scale(0.97); transition: 0.1s; }
      .card:active p { color: rgb(255, 203, 252); }
    }
  </style>
</head>
<body>

  <div class="container"><a href="book1.html" class="card"><p>모순</p></a></div>
  <div class="container"><a href="book2.html" class="card"><p>퀸 베이비</p></a></div>
  <div class="container"><a href="book3.html" class="card"><p>랩걸</p></a></div>
  <div class="container"><a href="book4.html" class="card"><p>자발적 고독</p></a></div>

  <div class="container">
    <a href="book5.html" class="card long-title">
      <p>
        색채가 없는
        <br class="mo-only"> 다자키 쓰쿠루와
        <br class="pc-only"> <br class="mo-only"> 그가 순례를 떠난 해
      </p>
    </a>
  </div>
  <h2>@lessspicy</h2>
  <script src="https://use.typekit.net/eer4nif.js" async onload="try{Typekit.load({async:true})}catch(e){}"></script>
  
  <script>
    // 뒤로가기 시 선택 상태 초기화
    window.addEventListener('pageshow', function(event) {
      if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
        document.querySelectorAll('.card').forEach(function(card) {
          card.classList.remove('selected');
        });
      }
    });

    // 클릭 이벤트 및 페이지 이동
    window.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.card').forEach(function(card) {
        card.addEventListener('click', function(e) {
          e.preventDefault(); 
          const targetUrl = this.getAttribute('href'); 
          this.classList.add('selected'); 
          setTimeout(function() {
            window.location.href = targetUrl;
          }, 150); 
        });
      });
    });
  </script>
</body>
</html>
